<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maria Limperi — Graphic Designer</title>
    <meta name="description" content="Maria Limperi is a graphic designer specialising in branding, logo design, print and packaging. Based in Greece, working since 2020.">
    <meta property="og:title" content="Maria Limperi — Graphic Designer">
    <meta property="og:description" content="Minimalism, functionality, and aesthetics. Branding, logo, print and packaging design.">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- ===== NAVIGATION ===== -->
    <header class="menu-container" role="banner">

        <!-- Burger button (mobile only) -->
        <button
            class="burger"
            id="burgerBtn"
            aria-label="Open navigation menu"
            aria-expanded="false"
            aria-controls="burgerMenu"
            onclick="toggleBurger()"
        >
            <span></span>
            <span></span>
            <span></span>
        </button>

        <!-- Mobile full-screen menu -->
        <nav class="burger-menu" id="burgerMenu" aria-label="Mobile navigation" aria-hidden="true">
            <a href="index.html?category=all"       onclick="closeBurger()">All</a>
            <a href="index.html?category=branding"  onclick="closeBurger()">Branding</a>
            <a href="index.html?category=logo"      onclick="closeBurger()">Logo</a>
            <a href="index.html?category=prints"    onclick="closeBurger()">Prints</a>
            <a href="index.html?category=packaging" onclick="closeBurger()">Packaging</a>
            <a href="about.html"                    onclick="closeBurger()">About / Contact</a>
        </nav>

        <!-- Desktop left nav -->
        <nav class="menu-bar" aria-label="Portfolio categories">
            <a href="index.html?category=all"       data-category="all">All</a>
            <a href="index.html?category=branding"  data-category="branding">Branding</a>
            <a href="index.html?category=logo"      data-category="logo">Logo</a>
            <a href="index.html?category=prints"    data-category="prints">Prints</a>
            <a href="index.html?category=packaging" data-category="packaging">Packaging</a>
        </nav>

        <!-- Logo (centred) -->
        <a href="index.html" class="logo-link">
            <img class="logo-img" src="images/white_black-logo.png" alt="Maria Limperi — Graphic Designer logo" width="120" height="60">
        </a>

        <!-- Desktop right nav -->
        <nav class="menu-bar" id="about" aria-label="Secondary navigation">
            <a href="about.html">About / Contact</a>
            <a href="https://www.instagram.com/maria.lymperi" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
                <svg class="social-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">

            </a>

                </svg>
            </a>
        </nav>
    </header>

    <!-- ===== HERO / INTRO ===== -->
    <main>
        <section class="intro-container" aria-label="Introduction">
            <p class="intro">We make it simple,<br>but unique!</p>
            <p class="intro-sub">Click below to explore</p>
            <button class="click-here" onclick="goToPortfolio('all')" aria-label="Scroll to portfolio">
                <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
                    <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0M8.5 4.5a.5.5 0 0 0-1 0v5.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293z"/>
                </svg>
            </button>
        </section>

        <!-- ===== PORTFOLIO GRID ===== -->
        <section id="portfolio" class="portfolio-grid" aria-label="Portfolio" aria-live="polite"></section>
    </main>

    <!-- ===== IMAGE MODAL ===== -->
    <div
        id="image-modal"
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-label="Portfolio image viewer"
        aria-hidden="true"
    >
        <button class="close" aria-label="Close image">&times;</button>
        <img class="modal-content" id="modal-img" src="" alt="">
    </div>

    <!-- ===== SCROLL TO TOP ===== -->
    <button id="scrollTopBtn" aria-label="Scroll to top">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
            <path fill-rule="evenodd" d="M8 12a.5.5 0 0 0 .5-.5V4.707l2.147 2.147a.5.5 0 0 0 .706-.708l-3-3a.5.5 0 0 0-.706 0l-3 3a.5.5 0 1 0 .706.708L7.5 4.707V11.5A.5.5 0 0 0 8 12"/>
        </svg>
    </button>

    <footer class="site-footer">
        <p>© 2025 mly.dsg — Maria Limperi. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
